name: Autofix

# Runs manually on a trusted branch to apply lint and formatting fixes.
# This avoids automatically checking out pull request head code in a
# privileged workflow context.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  autofix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # --ignore-scripts prevents post-install scripts from running.
        run: npm ci --ignore-scripts

      - name: Run ESLint autofix
        # continue-on-error because some errors are not auto-fixable; the build
        # workflow will catch anything that remains after this step.
        run: npm run lint:fix
        continue-on-error: true

      - name: Run Prettier format
        run: npm run format

      - name: Commit and push fixes (if any)
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m 'fix: autofix lint and formatting issues'
          git push origin HEAD:${{ github.ref_name }}
