name: Autofix

# Runs on Dependabot PRs to automatically apply lint and formatting fixes.
# Uses autofix-ci/action which commits any changed files back to the PR branch.
#
# Security notes:
# - pull_request_target is required because GitHub gives Dependabot PRs a read-only
#   token for the plain pull_request event (since Oct 2021), so write access would
#   be unavailable for committing fixes.
# - The job is gated on `github.actor == 'dependabot[bot]'` so only Dependabot
#   pull requests ever reach the checkout step.
# - Dependabot always creates branches in this repo (never forks), so the head ref
#   being checked out is trusted first-party code.
# - `npm ci --ignore-scripts` prevents any post-install scripts in the PR's
#   dependency tree from executing in this privileged context.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v7
        with:
          # Dependabot branches always live in this repo; this is not an external fork.
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # --ignore-scripts prevents post-install scripts from running in this
        # privileged workflow context (lint/format tools do not need them).
        run: npm ci --ignore-scripts

      - name: Run ESLint autofix
        # continue-on-error because some errors are not auto-fixable; the build
        # workflow will catch anything that remains after this step.
        run: npm run lint:fix
        continue-on-error: true

      - name: Run Prettier format
        run: npm run format

      - name: Commit fixes (if any)
        uses: autofix-ci/action@v1
        with:
          commit-message: 'fix: autofix lint and formatting issues'
