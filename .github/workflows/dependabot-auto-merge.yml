name: Dependabot Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

jobs:
  rebase:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      pull-requests: write
    steps:
      - name: Request rebase for conflicting Dependabot PRs
        run: |
          gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --author "dependabot[bot]" \
            --state open \
            --json number,mergeable \
            --jq '.[] | select(.mergeable == "CONFLICTING") | .number' \
          | xargs -r -I{} gh pr comment {} \
              --repo "$GITHUB_REPOSITORY" \
              --body "@dependabot rebase"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  auto-merge:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]'
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve and enable auto-merge for patch and minor updates
        if: contains(fromJSON('["version-update:semver-patch","version-update:semver-minor"]'), steps.metadata.outputs.update-type)
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
