    name: Build, Test, and Deploy

    on:
      push:
        branches:
          - '**' # Run on all branches
      pull_request:
        branches:
          - main
      workflow_dispatch: # Allows manual triggering of the workflow

    jobs:
      test:
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
          contents: read

        steps:
          - name: Checkout code
            uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

          - name: Setup Node.js
            uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
            with:
              node-version: '20'
              cache: 'npm'

          - name: Install dependencies
            run: npm ci

          - name: Install Playwright browsers
            run: npx playwright install --with-deps chromium

          - name: Run ESLint
            run: npm run lint

          - name: Check code formatting
            run: npm run format:check

          - name: Build application
            run: npm run build

          - name: Start preview server
            run: npm run preview &
            env:
              CI: true

          - name: Wait for server
            run: npx wait-on http://localhost:4173 --timeout 30000

          - name: Run Cucumber tests
            run: npm run test:ci
            env:
              BASE_URL: http://localhost:4173/floorplan/

          - name: Upload test results
            if: always()
            uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
            with:
              name: test-results
              path: test-results/
              retention-days: 30

      lint-warnings-investigation:
        runs-on: ubuntu-latest
        continue-on-error: true
        permissions:
          contents: read

        steps:
          - name: Checkout code
            uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

          - name: Setup Node.js
            uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
            with:
              node-version: '20'
              cache: 'npm'

          - name: Install dependencies
            run: npm ci

          - name: Run lint and capture output
            run: npm run lint | tee lint-output.txt

          - name: Upload lint investigation artifact
            if: always()
            uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
            with:
              name: lint-warnings-investigation
              path: lint-output.txt
              retention-days: 30

      svg-rendering-investigation:
        runs-on: ubuntu-latest
        continue-on-error: true
        permissions:
          contents: read

        steps:
          - name: Checkout code
            uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

          - name: Setup Node.js
            uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
            with:
              node-version: '20'
              cache: 'npm'

          - name: Install dependencies
            run: npm ci

          - name: Install Playwright browsers
            run: npx playwright install --with-deps chromium

          - name: Build application
            run: npm run ci-build

          - name: Start preview server
            run: npm run preview -- --host 127.0.0.1 &
            env:
              CI: true

          - name: Wait for server
            run: npx wait-on http://127.0.0.1:4173 --timeout 30000

          - name: Run svg-rendering test
            run: npm run test:svg-rendering
            env:
              BASE_URL: http://127.0.0.1:4173/floorplan/

          - name: Upload svg-rendering investigation artifacts
            if: always()
            uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
            with:
              name: svg-rendering-investigation
              path: |
                test-results/
                playwright-report/
              retention-days: 30

      deploy:
        needs: test
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        runs-on: ubuntu-latest
        permissions:
          contents: write # Grant write permissions for the action to create the gh-pages branch
          pages: write # Grant write permissions for deploying to GitHub Pages
          id-token: write # Needed for OIDC authentication with GitHub Pages

        steps:
          - name: Checkout repository
            uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

          - name: Set up Node.js
            uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
            with:
              node-version: '22' # Or your preferred Node.js version
              cache: 'npm'

          - name: Install dependencies
            run: npm install

          - name: Run ESLint
            run: npm run lint

          - name: Check code formatting
            run: npm run format:check

          - name: Build project
            run: npm run build

          - name: Configure GitHub Pages
            uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

          - name: Upload build artifact
            uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
            with:
              path: './dist' # The directory where Vite outputs your build

          - name: Deploy to GitHub Pages
            id: deployment
            uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5